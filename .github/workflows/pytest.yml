name: pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out integration repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # PHACC (in requirements_test.txt) pins a matching Home Assistant
          # release plus pytest, pytest-cov, coverage, etc. Installing those
          # separately would fight its exact pins, so install only this.
          pip install -r requirements_test.txt

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "1"
        run: |
          # pipefail so a pytest failure (incl. collection/import errors)
          # propagates through the tee; pytest-output.log is surfaced in the
          # job summary below.
          set -o pipefail
          python -c "import custom_components.realtime_trains.const; print('import check OK')"
          pytest tests/ \
            -m 'not live' \
            -ra \
            --asyncio-mode=auto \
            --timeout=30 \
            --junitxml=integration-junit.xml \
            --cov=custom_components.realtime_trains \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing:skip-covered \
            --tb=short 2>&1 | tee pytest-output.log
        id: integration-tests

      - name: Run live-API integration tests (optional, requires RTT_TOKEN secret)
        if: vars.RTT_TOKEN != ''
        env:
          RTT_TOKEN: ${{ secrets.RTT_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
          CI: "1"
        run: |
          pytest tests/test_live_api.py -v \
            --asyncio-mode=auto \
            --timeout=30 \
            --junitxml=live-junit.xml \
            -m live
        continue-on-error: true
        id: live-tests

      - name: Publish test summary to job summary
        if: always()
        env:
          PYTEST_OUTCOME: ${{ steps.integration-tests.outcome }}
        run: |
          {
            echo "## Test results"
            echo ""
            echo "### HA integration tests"
            python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          outcome = os.environ.get("PYTEST_OUTCOME", "")
          try:
              root = ET.parse("integration-junit.xml").getroot()
          except (FileNotFoundError, ET.ParseError):
              root = None

          # pytest's xunit2 format keeps the counts on the inner <testsuite>
          # element(s), not the <testsuites> root.
          suites = []
          if root is not None:
              suites = [root] if root.tag == "testsuite" else root.findall(".//testsuite")

          def agg(attr):
              return sum(int(s.attrib[attr]) for s in suites if s.attrib.get(attr, "").isdigit())

          if any(s.attrib.get("tests", "").isdigit() for s in suites):
              t, f, e, s = agg("tests"), agg("failures"), agg("errors"), agg("skipped")
              # Honest status: green only if the step itself succeeded.
              ok = outcome == "success" and f == 0 and e == 0
              print(f"{'✅' if ok else '❌'} {t - f - e - s} passed, "
                    f"{f} failed, {e} errored, {s} skipped (of {t})")
              if f or e:
                  print("\n#### Failing tests")
                  for tc in root.iter("testcase"):
                      for child in tc:
                          if child.tag in ("failure", "error"):
                              lines = (child.attrib.get("message", "") or "").splitlines()
                              msg = lines[0][:160] if lines else child.tag
                              cls = tc.attrib.get("classname", "?")
                              name = tc.attrib.get("name", "?")
                              print(f"- `{cls}.{name}`: {msg}")
          else:
              print(
                  "❌ pytest produced no usable JUnit report — it exited before "
                  "any test ran (collection / import error). See output below."
              )
          PY
            if [ "$PYTEST_OUTCOME" != "success" ] && [ -f pytest-output.log ]; then
              echo ""
              echo "<details><summary>pytest output</summary>"
              echo ""
              echo '```text'
              tail -n 120 pytest-output.log
              echo '```'
              echo "</details>"
            fi
            echo ""
            echo "### Live-API tests"
            if [ -n "$RTT_TOKEN" ] && [ -f live-junit.xml ]; then
              python - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse("live-junit.xml")
          except FileNotFoundError:
              print("No live junit found"); sys.exit(0)
          root = tree.getroot()
          tests = root.attrib.get("tests", "?")
          failures = root.attrib.get("failures", "0")
          errors = root.attrib.get("errors", "0")
          skipped = root.attrib.get("skipped", "0")
          total = int(tests) if tests.isdigit() else 0
          passed = total - int(failures or 0) - int(errors or 0) - int(skipped or 0)
          emoji = "✅" if failures == "0" and errors == "0" else "❌"
          print(f"{emoji} {passed} passed, {failures} failed, {errors} errored, {skipped} skipped (of {tests})")
          PY
            elif [ -z "$RTT_TOKEN" ]; then
              echo "_Skipping live-API tests — \`RTT_TOKEN\` secret is not set on this repo. See \`scripts/capture_live_fixtures.py\`._"
            else
              echo "_Live tests did not produce output._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate PR with failed tests
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: pytest results
          comment_mode: changes
          files: |
            integration-junit.xml
            live-junit.xml
          comment_title: ":steam_locomotive: Realtime Trains test results"
          compare_to_earlier_commit: false
          ignore_runs: true

      - name: Upload coverage to Codecov
        if: always() && github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-integration.xml
          flags: integration
          name: realtime-trains-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage-integration.xml
          if-no-files-found: ignore
          retention-days: 14
