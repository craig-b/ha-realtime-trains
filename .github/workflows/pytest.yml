name: pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out integration repo
        uses: actions/checkout@v4

      - name: Check out Home Assistant core
        uses: actions/checkout@v4
        with:
          repository: home-assistant/core
          path: homeassistant-core

      - name: Set up Python
        uses: actions/setup-python@v5
        id: python
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            homeassistant-core/requirements_test.txt
            homeassistant-core/requirements.txt

      - name: Mount integration into HA core
        run: |
          mkdir -p homeassistant-core/homeassistant/components/realtime_trains
          cp -r custom_components/realtime_trains/. homeassistant-core/homeassistant/components/realtime_trains/

      - name: Install uv
        run: pip install uv

      - name: Install HA core test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r homeassistant-core/requirements_test.txt -r homeassistant-core/requirements.txt
          pip install pytest-cov coverage[toml]

      - name: Run pytest (HA-dependent integration tests)
        env:
          PYTHONPATH: homeassistant-core:${{ github.workspace }}
          CI: "1"
        run: |
          pytest \
            tests/ \
            -m 'not live' \
            -ra \
            --junitxml="$GITHUB_WORKSPACE/integration-junit.xml" \
            --cov=custom_components.realtime_trains \
            --cov-report=xml:"$GITHUB_WORKSPACE/coverage-integration.xml" \
            --cov-report=term-missing:skip-covered \
            --cov-config="$GITHUB_WORKSPACE/pyproject.toml"
        continue-on-error: true
        id: integration-tests

      - name: Run live-API integration tests (optional, requires RTT_TOKEN secret)
        if: vars.RTT_TOKEN != ''
        env:
          RTT_TOKEN: ${{ secrets.RTT_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
          CI: "1"
        run: |
          pytest tests/test_live_api.py -v \
            --junitxml="$GITHUB_WORKSPACE/live-junit.xml" \
            -m live
        continue-on-error: true
        id: live-tests

      - name: Publish test summary to job summary
        if: always()
        run: |
          {
            echo "## Test results"
            echo ""
            if [ -f integration-junit.xml ]; then
              echo "### HA integration tests"
              python - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse("integration-junit.xml")
          except FileNotFoundError:
              print("No integration junit found"); sys.exit(0)
          root = tree.getroot()
          tests = root.attrib.get("tests", "?")
          failures = root.attrib.get("failures", "0")
          errors = root.attrib.get("errors", "0")
          skipped = root.attrib.get("skipped", "0")
          total_runs = int(tests) if tests.isdigit() else 0
          passed = total_runs - int(failures or 0) - int(errors or 0) - int(skipped or 0)
          emoji = "✅" if failures == "0" and errors == "0" else "❌"
          print(f"{emoji} {passed} passed, {failures} failed, {errors} errored, {skipped} skipped (of {tests})")
          if int(failures or 0) or int(errors or 0):
              print("")
              print("#### Failing tests")
              for tc in root.iter("testcase"):
                  for child in tc:
                      if child.tag in ("failure", "error"):
                          msg = child.attrib.get("message", "").splitlines()[0][:120]
                          print(f"- {tc.attrib.get('classname','?')}.{tc.attrib.get('name','?')}: {msg}")
          PY
          else
            echo "_No integration test results to summarise._"
          fi
            echo ""
            echo "### Live-API tests"
            if [ -n "$RTT_TOKEN" ] && [ -f live-junit.xml ]; then
              python - <<'PY'
          import xml.etree.ElementTree as ET
          import sys
          try:
              tree = ET.parse("live-junit.xml")
          except FileNotFoundError:
              print("No live junit found"); sys.exit(0)
          root = tree.getroot()
          tests = root.attrib.get("tests", "?")
          failures = root.attrib.get("failures", "0")
          errors = root.attrib.get("errors", "0")
          skipped = root.attrib.get("skipped", "0")
          total = int(tests) if tests.isdigit() else 0
          passed = total - int(failures or 0) - int(errors or 0) - int(skipped or 0)
          emoji = "✅" if failures == "0" and errors == "0" else "❌"
          print(f"{emoji} {passed} passed, {failures} failed, {errors} errored, {skipped} skipped (of {tests})")
          PY
            elif [ -z "$RTT_TOKEN" ]; then
              echo "_Skipping live-API tests — \`RTT_TOKEN\` secret is not set on this repo. See \`scripts/capture_live_fixtures.py\`._"
            else
              echo "_Live tests did not produce output._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate PR with failed tests
        if: always() && github.event_name == 'pull_request' && (steps.integration-tests.outcome == 'failure' || steps.live-tests.outcome == 'failure')
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: pytest results
          comment_mode: changes
          files: |
            integration-junit.xml
            live-junit.xml
          comment_title: ":steam_locomotive: Realtime Trains test results"
          compare_to_earlier_commit: false
          ignore_runs: true

      - name: Upload coverage to Codecov
        if: always() && github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-integration.xml
          flags: integration
          name: realtime-trains-integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Fail the workflow if integration tests failed
        if: steps.integration-tests.outcome == 'failure'
        run: |
          echo "::error::Integration tests failed — see the annotations above."
          exit 1
