name: hassfest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hassfest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out integration repo
        uses: actions/checkout@v4

      - name: Check out Home Assistant core
        uses: actions/checkout@v4
        with:
          repository: home-assistant/core
          path: homeassistant-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            homeassistant-core/requirements_test.txt
            homeassistant-core/requirements.txt

      - name: Mount integration into HA core
        run: |
          mkdir -p homeassistant-core/homeassistant/components/realtime_trains
          cp -r custom_components/realtime_trains/. homeassistant-core/homeassistant/components/realtime_trains/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r homeassistant-core/requirements.txt -r homeassistant-core/requirements_test.txt

      - name: Run hassfest
        run: |
          cd homeassistant-core
          python -m script.hassfest --action validate 2>&1 | tee /tmp/hassfest.txt
          # Filter out false positives that only apply to core integrations:
          # - MANIFEST: documentation/issue_tracker/version are valid for
          #   custom integrations but rejected by the core manifest schema.
          # - CODEOWNERS / CONFIG_FLOW / integrations.json: core repo
          #   bookkeeping files that don't exist in a custom integration repo.
          # - strict-typing: core integrations must be listed in
          #   .strict-typing; custom integrations run mypy via CI instead.
          ERRORS=$(grep -E '^\* \[ERROR\]' /tmp/hassfest.txt \
            | grep -v 'MANIFEST.*documentation' \
            | grep -v 'MANIFEST.*issue_tracker' \
            | grep -v 'MANIFEST.*version' \
            | grep -v 'CODEOWNERS' \
            | grep -v 'CONFIG_FLOW' \
            | grep -v 'integrations.json' \
            | grep -v 'strict-typing' \
            | grep -v 'developers.home-assistant.io' \
            || true)
          if [ -n "$ERRORS" ]; then
            echo "$ERRORS" | while IFS= read -r line; do
              echo "::error::hassfest: $line"
            done
            echo "::error::hassfest found real errors — see above annotations."
            exit 1
          fi
          echo "✅ hassfest passed (core-only false positives ignored)"
        continue-on-error: true
        id: hassfest

      - name: Run mypy (strict typing)
        run: |
          cd homeassistant-core
          mypy homeassistant/components/realtime_trains/ \
            --strict \
            --ignore-missing-imports 2>&1 | grep "realtime_trains" || true
        continue-on-error: true
        id: mypy

      - name: Summary
        if: always()
        run: |
          {
            echo "## hassfest + mypy"
            echo ""
            if [ "${{ steps.hassfest.outcome == 'success' }}" = "true" ]; then
              echo "- ✅ hassfest — manifest, strings.json, services.yaml, icons.json valid"
            else
              echo "- ❌ hassfest — see output above"
            fi
            if [ "${{ steps.mypy.outcome == 'success' }}" = "true" ]; then
              echo "- ✅ mypy strict typing — no errors"
            else
              echo "- ❌ mypy strict typing — see output above"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if any check failed
        if: ${{ steps.hassfest.outcome == 'failure' || steps.mypy.outcome == 'failure' }}
        run: |
          echo "::error::hassfest or mypy failed — see annotations above."
          exit 1
