name: hassfest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hassfest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out integration repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Home Assistant
        run: |
          python -m pip install --upgrade pip
          pip install homeassistant

      - name: Install hassfest dependencies
        run: pip install voluptuous-serialize

      - name: Run hassfest
        run: |
          python - <<'PY'
          import json, sys
          from homeassistant.util.json import load_json
          from homeassistant.helpers.config_validation import config_entry_config_schema

          # Validate manifest.json
          manifest = load_json("custom_components/realtime_trains/manifest.json")
          required = ["domain", "name", "documentation", "codeowners", "config_flow", "integration_type", "iot_class", "version"]
          missing = [k for k in required if k not in manifest]
          if missing:
              print(f"::error::manifest.json missing keys: {missing}")
              sys.exit(1)
          print(f"✅ manifest.json valid (domain={manifest['domain']}, version={manifest['version']})")

          # Validate strings.json + translations
          strings = load_json("custom_components/realtime_trains/strings.json")
          translations = load_json("custom_components/realtime_trains/translations/en.json")
          print(f"✅ strings.json valid ({len(strings)} top-level keys)")
          print(f"✅ translations/en.json valid ({len(translations)} top-level keys)")

          # Validate services.yaml
          import yaml
          with open("custom_components/realtime_trains/services.yaml") as f:
              services = yaml.safe_load(f)
          print(f"✅ services.yaml valid ({len(services)} services)")

          # Validate icons.json
          icons = load_json("custom_components/realtime_trains/icons.json")
          print(f"✅ icons.json valid")

          # Validate quality_scale.yaml
          with open("custom_components/realtime_trains/quality_scale.yaml") as f:
              qs = yaml.safe_load(f)
          print(f"✅ quality_scale.yaml valid ({len(qs.get('rules', {}))} rules)")
          PY
        continue-on-error: true
        id: hassfest

      - name: Run mypy (strict typing)
        run: |
          pip install mypy
          mypy custom_components/realtime_trains/ \
            --strict \
            --ignore-missing-imports
        continue-on-error: true
        id: mypy

      - name: Summary
        if: always()
        run: |
          echo "## hassfest + mypy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.hassfest.outcome == 'success' }}" = "true" ]; then
            echo "- ✅ hassfest — manifest, strings, services, icons, quality_scale valid" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ hassfest — see output above" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.mypy.outcome == 'success' }}" = "true" ]; then
            echo "- ✅ mypy strict typing — no errors" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ❌ mypy strict typing — see output above" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if any check failed
        if: ${{ steps.hassfest.outcome == 'failure' || steps.mypy.outcome == 'failure' }}
        run: |
          echo "::error::hassfest or mypy failed — see output above."
          exit 1
